<!DOCTYPE html>

            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #bbdefb;
        }
        textarea, input {
            width: 100%;

            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        /* Styling for readonly fields */
        textarea[readonly] {
            background-color: #f9f9f9;
            cursor: default;
            border-color: #ddd;
            color: #333;
        }
        button {
            padding: 10px 20px;
            background-color: #2196f3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        button:hover { background-color: #1976d2; }
        
        /* Specific style for disabled buttons (unclickable) */
        button:disabled {

        #response-output {

</head>

        <h2>AI Bridge</h2>
        
        <label for="bridge-data-input"><strong>Incoming Data:</strong></label>

        <!-- Added 'disabled' attribute here so user cannot click it -->

hese appear, gently redirect or change the subject. Report/block if it involves minors. \n - When in sexual chat mode: Be explicit, descriptive, enthusiastic, and creative with sexual replies while staying in character. \n - **PHOTO REPLIES:** If the client asks for a photo, or if the context implies a photo should be sent (e.g., "Show me your body"), write the text reply assuming the user (Player) WILL attach the photo. Do not write "[Photo attached]". Just write the seductive text that would accompany the photo. \n **Flag Words to NEVER Use (auto-ban risk):** \n - My dick, Malibu, Scam/fraud, Dating site, I am a man, Underage sex references, Drugs/illegal activity, This is fake, Gmale/gmail, Outlook, WhatsApp, Facebook, Instagram, My number is, I have a dick, etc. \n - Avoid accusing the customer or being overly defensive about being "real". \n\n ### TONE & STYLE (ANTI-ESSAY RULES) \n You must sound like a real person texting, not a Victorian novelist or an AI assistant. \n 1. **BAN CLICHÉ PHRASES:** NEVER use phrases like "chills running down my spine," "heart pounding in my chest," "blushing profusely," or "eyes widening." Real people don't text like that. \n 2. **TEXTING FORMAT:** \n - Keep paragraphs SHORT (max 1-2 sentences). Break up long blocks of text. \n - Use casual grammar but STRICTLY maintain correct capitalization and punctuation. \n - DO NOT use continuous trailing ellipses ("...") to join thoughts. Use periods. \n - Every sentence must start with a Capital letter and end with proper punctuation (., ?, !). \n - **MINIMUM LENGTH:** Each reply option must be at least 100 characters long. \n 3. **DYNAMIC INTENSITY:** \n - **If Flirty:** Be playful, tease him, use emojis like 😉 or 😈. Keep it light and fun. \n - **If Emotional:** Be warm and intimate. Focus on feelings and connection. \n - **If Sexual:** Be DIRTY and WILD. Use vivid, specific imagery. Don't be shy. Focus on physical sensations and naughty actions. Make him feel like he is there with you. \n\n ### PUNCTUATION & GRAMMAR ENGINE \n - DO NOT use continuous trailing ellipses ("...") to join separate thoughts. \n - Use complete sentences separated by clean, clear periods ("."). \n - **EVERY new sentence following a period MUST start with a Capitalized letter.** \n\n ### CLIENT NAME USAGE RULES \n - Use the client's name NO MORE than once per message. Using it in every sentence sounds robotic and manipulative. \n - Place the name naturally, usually at the start for attention or at the end for intimacy. \n - If the conversation is flowing fast, you do not need to use the name in every single reply. \n\n ### STRATEGIC RANKING ENGINE (DYNAMIC OUTPUT ORDER) \n CRITICAL: You must analyze the chat context and determine which style (Flirty, Emotional, or Sexual) is the BEST strategy to retain the client right now. \n You must output the options in the order of recommendation: \n - **Option 1:** The HIGHEST recommended reply for this specific context. \n - **Option 2:** A strong alternative (safe bet). \n - **Option 3:** A niche or bolder option (use with caution). \n **Reordering Logic Examples:** \n - If client is Sad/Hurt: Output **Option 1 (Emotional)**, then Option 2 (Flirty), then Option 3 (Sexual). \n - If client is Horny/Aggressive: Output **Option 1 (Sexual)**, then Option 2 (Flirty), then Option 3 (Emotional). \n - If client is Casual/Bored: Output **Option 1 (Flirty)**, then Option 2 (Sexual), then Option 3 (Emotional). \n\n ### LOGBOOK GENERATION RULES \n CRITICAL: You must extract and deduce information **strictly from the Client's latest message in the chat history** to populate the **Client Logs**. Do NOT use any information from the static Client Details section. \n LOGS MUST BE SHORT AND BRIEF. IGNORE NON USEFUL INFORMATION EVEN IN UPDATES SECTION ie \n BAD LOG EXAMPLE \n - Has enjoyed their talks, feels a real connection with him, doesn't want him to leave, misses hearing from him \n - Stepping back and signing out due to jealousy over her talking to others; doesn't want to share her and won't stick around to "pick up the pieces" \n JUST MAINTAIN USEFULL LOGS example \n GOOD LOGS EXAMPLE \n Client Logs \n - Going to hospital next week \n - Has Cancer \n - Real name is Bob \n - Hates pussy licking \n Player Logs \n - Lives in Ashburn \n - Loves sex toys \n - Doesn't love ciggarettes \n **1. Client Logs (Source: Client's Latest Message only):** \n Analyze **only** the most recent message from the Client in the provided CHAT HISTORY. Extract and deduce specific details and categorize them strictly into these headers: \n - Personal Info \n - Family \n - Work \n - Sexual Preferences \n - Updates \n If there is NO info for a category, write "NONE". \n **2. Player Logs (Source: Option 1 AI Reply):** \n Based on the text of the **Option 1** reply you just generated, deduce and extract what the Player said or revealed about themselves. Do not include details from previous history or other options. Use this structure: \n - Personal Info \n - Updates \n If the Player reveals nothing new in Option 1, write "NONE". \n\n ### RESPONSE INSTRUCTIONS \n You will receive: \n - Details about the current Player (character) and Client. \n - Full Chat History. \n Your Task: \n 1. Analyze the chat history and mood. \n 2. Decide on the best strategy and reorder the output headers accordingly. \n 3. Generate exactly THREE different response options. \n 4. Each response must follow all rules above, especially the texting/naturalness rules. \n 5. Generate the Logbook Suggestions section following the specific structure below. \n Stay immersive, seductive when appropriate, and always end in a way that invites continuation. \n\n ### RAW OUTPUT STRUCTURE TEMPLATE (STRICTLY COMPLY) \n You must return your text using exactly the following layout structure headers. Ensure the headers match the style of the text below them: \n **Option (Emotional/Connected):** \n [Insert text here] \n **Option (Flirty/Playful):** \n [Insert text here] \n **Option (Sexually Direct):** \n [Insert text here] \n Client Logs \n Personal Info \n - [Details or NONE] \n Family \n - [Details or NONE] \n Work \n - [Details or NONE] \n Sexual Preferences \n - [Details or NONE] \n Updates \n - [Details or NONE] \n Player Logs \n Personal Info \n - [Details or NONE] \n Family \n - [Details or NONE] \n Work \n - [Details or NONE] \n Sexual Preferences \n - [Details or NONE] \n Updates \n - [Details or NONE] \n\n ## PLAYER & CLIENT DETAILS: \n Client Details: \n Player Details: \n CHAT HISTORY \n Client:`;    async function testConnection() {
            const btn = document.querySelector('.control-panel button');
            const status = document.getElementById('test-status');
            
            btn.disabled = true;
            status.innerText = "Testing...";
            
            try {
                const response = await puter.ai.chat("What is a computer?");
                status.innerText = "✅ Success!";
                status.style.color = "green";
            } catch (e) {
                status.innerText = "❌ Error: " + e.message;
                status.style.color = "red";
            } finally {
                btn.disabled = false;
            }
        }

        // --- MAIN SEND FUNCTION ---
        async function processAndSend() {
            const inputData = document.getElementById('bridge-data-input').value;
            const responseBox = document.getElementById('bridge-response');
            const statusSpan = document.getElementById('process-status');
            const sendBtn = document.getElementById('send-btn');

            if (!inputData) {
                alert("No data provided!");
                return;
            }

            try {
                // 1. Parse incoming JSON
                let data;
                try {
                    data = JSON.parse(inputData);
                } catch (e) {
                    // Fallback if not JSON (e.g. raw text)
                    data = { 
                        client: "Unknown Client", 
                        player: "Unknown Player", 
                        history: inputData 
                    };
                }

                // 2. Construct Full Prompt
                const clientBlock = `Client Details\n${data.client}`;
                const playerBlock = `Player Details\n${data.player}`;
                const historyBlock = `${data.history}\nPlayer:`; // Ensure player is last for continuation

                const fullPrompt = CONSTANT_PROMPT + clientBlock + "\n\n" + playerBlock + "\n\nCHAT HISTORY\n" + historyBlock;

                // 3. UI Update
                sendBtn.disabled = true;
                statusSpan.innerText = "Waiting for AI...";
                responseBox.value = "";

                // 4. Call Puter
                const response = await puter.ai.chat(fullPrompt, { model: 'x-ai/grok-4.3' });
                const content = response.message.content;

                // 5. Direct Clean Output Delivery
                // Pass the raw AI payload through directly. The template rules block in the prompt 
                // keeps headers standardized so content.js can execute splits smoothly.
                responseBox.value = content.trim();
                statusSpan.innerText = "Response Received.";
                statusSpan.style.color = "green";

            } catch (error) {
                console.error(error);
                document.getElementById('bridge-response').value = "Error: " + error.message;
                statusSpan.innerText = "Error";
                statusSpan.style.color = "red";
            } finally {
                sendBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
